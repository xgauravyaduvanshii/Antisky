name: Antisky CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.22'
  NODE_VERSION: '20'

jobs:
  # ===== Go Services =====
  go-lint-test:
    name: Go Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, control-plane, build-orchestrator]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/${{ matrix.service }}

      - name: Test
        run: go test -v -race -coverprofile=coverage.txt ./...
        working-directory: services/${{ matrix.service }}

      - name: Build
        run: CGO_ENABLED=0 go build -o /dev/null .
        working-directory: services/${{ matrix.service }}

  # ===== CLI =====
  cli-build:
    name: CLI Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build CLI
        run: |
          GOOS=linux GOARCH=amd64 go build -o antisky-linux-amd64 .
          GOOS=darwin GOARCH=arm64 go build -o antisky-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build -o antisky-windows-amd64.exe .
        working-directory: tools/cli

  # ===== Dashboard =====
  dashboard:
    name: Dashboard Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/dashboard/package-lock.json
      - run: npm ci
        working-directory: apps/dashboard
      - run: npm run lint
        working-directory: apps/dashboard
      - run: npm run build
        working-directory: apps/dashboard

  # ===== Docker Build =====
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [go-lint-test, dashboard]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [auth, control-plane, build-orchestrator]
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          IMAGE=${{ secrets.ECR_REGISTRY }}/antisky-${{ matrix.service }}:${{ github.sha }}
          docker build -t $IMAGE services/${{ matrix.service }}
          docker push $IMAGE

  # ===== Deploy =====
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy services
        run: |
          echo "Deploying to ECS..."
          # aws ecs update-service --cluster antisky-dev --service auth --force-new-deployment
          # aws ecs update-service --cluster antisky-dev --service control-plane --force-new-deployment
          # aws ecs update-service --cluster antisky-dev --service build-orchestrator --force-new-deployment
          echo "Deployment triggered"
